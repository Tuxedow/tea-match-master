<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>你是什么茶</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        :root {
            /* 彩虹配色 */
            --rainbow-red: #FF0018;
            --rainbow-orange: #FFA52C;
            --rainbow-yellow: #FFFF41;
            --rainbow-green: #008018;
            --rainbow-blue: #0000F9;
            --rainbow-purple: #86007D;

            --bg: #FAFAFA;
            --bg-card: #FFFFFF;
            --text: #1A1A1A;
            --text-secondary: #666666;
            --text-tertiary: #999999;
            --border: #E5E5E5;
            --border-hover: #CCCCCC;
            --accent: var(--rainbow-purple);
            --accent-light: #FFF0F5;
            --shadow: 0 1px 2px rgba(0,0,0,0.04);
            --radius: 6px;
        }

        /* 彩虹渐变背景 */
        body {
            background: linear-gradient(135deg,
                rgba(255,0,24,0.05) 0%,
                rgba(255,165,44,0.05) 20%,
                rgba(255,255,65,0.05) 40%,
                rgba(0,128,24,0.05) 60%,
                rgba(0,0,249,0.05) 80%,
                rgba(134,0,125,0.05) 100%);
            min-height: 100vh;
        }

        header {
            background: var(--bg-card);
            border-bottom: 3px solid;
            border-image: linear-gradient(90deg,
                var(--rainbow-red),
                var(--rainbow-orange),
                var(--rainbow-yellow),
                var(--rainbow-green),
                var(--rainbow-blue),
                var(--rainbow-purple)) 1;
            padding: 16px 24px;
            text-align: center;
        }

        header h1 {
            font-size: 18px;
            font-weight: 800;
            letter-spacing: 3px;
            text-transform: uppercase;
            background: linear-gradient(90deg,
                var(--rainbow-red),
                var(--rainbow-orange),
                var(--rainbow-yellow),
                var(--rainbow-green),
                var(--rainbow-blue),
                var(--rainbow-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .progress-dot.active {
            background: linear-gradient(90deg,
                var(--rainbow-red),
                var(--rainbow-orange),
                var(--rainbow-yellow),
                var(--rainbow-green),
                var(--rainbow-blue),
                var(--rainbow-purple));
        }

        .option.selected {
            background: linear-gradient(135deg,
                rgba(255,0,24,0.1),
                rgba(134,0,125,0.1));
            border-color: var(--rainbow-purple);
            color: var(--rainbow-purple);
        }

        .btn-primary {
            background: linear-gradient(90deg,
                var(--rainbow-red),
                var(--rainbow-orange),
                var(--rainbow-yellow),
                var(--rainbow-green),
                var(--rainbow-blue),
                var(--rainbow-purple));
            color: white;
            font-weight: 600;
        }

        .result-card:first-child {
            border-color: var(--rainbow-purple);
            border-width: 3px;
            background: linear-gradient(135deg,
                rgba(255,0,24,0.03),
                rgba(255,165,44,0.03),
                rgba(0,128,24,0.03),
                rgba(0,0,249,0.03),
                rgba(134,0,125,0.03));
        }

        .result-brand {
            background: linear-gradient(90deg,
                var(--rainbow-red),
                var(--rainbow-orange),
                var(--rainbow-yellow),
                var(--rainbow-green),
                var(--rainbow-blue),
                var(--rainbow-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 800;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* 主容器 */
        .container {
            max-width: 520px;
            margin: 0 auto;
            padding: 40px 20px 60px;
        }

        /* 进度 */
        .progress {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 40px;
        }

        .progress-dot {
            width: 32px;
            height: 4px;
            background: var(--border);
            border-radius: 2px;
            transition: background 0.3s ease;
        }

        .progress-dot.active {
            background: var(--text);
        }

        /* 步骤标题 */
        .step-header {
            margin-bottom: 24px;
        }

        .step-number {
            font-size: 12px;
            color: var(--text-tertiary);
            margin-bottom: 4px;
        }

        .step-title {
            font-size: 24px;
            font-weight: 500;
        }

        /* 选项卡片 */
        .options {
            display: grid;
            grid-template-columns: 1fr;
            gap: 8px;
        }

        .option {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px 20px;
            cursor: pointer;
            transition: all 0.15s ease;
            font-size: 15px;
        }

        .option:hover {
            border-color: var(--border-hover);
        }

        .option.selected {
            background: var(--accent-light);
            border-color: var(--accent);
            color: var(--text);
        }

        /* 结果区域 */
        .result {
            display: none;
        }

        .result.show {
            display: block;
        }

        .result-title {
            font-size: 20px;
            text-align: center;
            margin-bottom: 32px;
            color: var(--text-secondary);
        }

        /* 结果卡片 */
        .result-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px;
            margin-bottom: 12px;
        }

        .result-card:first-child {
            border-color: var(--accent);
            border-width: 2px;
        }

        .result-rank {
            font-size: 12px;
            color: var(--text-tertiary);
            margin-bottom: 8px;
        }

        .result-brand {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .result-drinks {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 12px;
        }

        .result-reason {
            font-size: 13px;
            color: var(--text-tertiary);
            font-style: italic;
        }

        /* 按钮 */
        .actions {
            display: flex;
            gap: 12px;
            margin-top: 32px;
        }

        .btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: var(--radius);
            font-size: 14px;
            cursor: pointer;
            transition: opacity 0.15s ease;
        }

        .btn-primary {
            background: var(--text);
            color: white;
        }

        .btn-secondary {
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-secondary);
        }

        .btn:hover {
            opacity: 0.8;
        }

        /* 加载动画 */
        .loading {
            display: none;
            text-align: center;
            padding: 40px;
        }

        .loading.show {
            display: block;
        }

        .loading-dots {
            display: inline-flex;
            gap: 4px;
        }

        .loading-dots span {
            width: 8px;
            height: 8px;
            background: var(--text-tertiary);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .loading-dots span:nth-child(1) { animation-delay: -0.32s; }
        .loading-dots span:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        /* 响应式 */
        @media (max-width: 480px) {
            .container {
                padding: 24px 16px 40px;
            }
        }
    </style>
</head>
<body onload="init()">
    <header>
        <h1>你是什么茶</h1>
    </header>

    <div class="container">
        <!-- 进度 -->
        <div class="progress" id="progress">
            <div class="progress-dot active"></div>
            <div class="progress-dot"></div>
            <div class="progress-dot"></div>
            <div class="progress-dot"></div>
        </div>

        <!-- 步骤1: 性别 -->
        <div class="step" id="step1">
            <div class="step-header">
                <div class="step-number">STEP 1 / 4</div>
                <div class="step-title">你是哪种生物？</div>
            </div>
            <div class="options" id="options1"></div>
        </div>

        <!-- 步骤2: 年龄 -->
        <div class="step" id="step2" style="display: none;">
            <div class="step-header">
                <div class="step-number">STEP 2 / 4</div>
                <div class="step-title">你是什么段位？</div>
            </div>
            <div class="options" id="options2"></div>
        </div>

        <!-- 步骤3: 职业 -->
        <div class="step" id="step3" style="display: none;">
            <div class="step-header">
                <div class="step-number">STEP 3 / 4</div>
                <div class="step-title">你靠什么谋生？</div>
            </div>
            <div class="options" id="options3"></div>
        </div>

        <!-- 步骤4: 预算 -->
        <div class="step" id="step4" style="display: none;">
            <div class="step-header">
                <div class="step-number">STEP 4 / 4</div>
                <div class="step-title">你有多少预算？</div>
            </div>
            <div class="options" id="options4"></div>
        </div>

        <!-- 加载中 -->
        <div class="loading" id="loading">
            <div class="loading-dots">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>

        <!-- 结果 -->
        <div class="result" id="result">
            <div class="result-title">测出来了，你自己看吧</div>
            <div id="resultCards"></div>
            <div class="actions">
                <button class="btn btn-secondary" onclick="saveImage()">保存图片</button>
                <button class="btn btn-primary" onclick="restart()">再测一次</button>
            </div>
        </div>
    </div>

    <script>
        // 选项配置
        const options = {
            1: [
                { value: '男', label: '男' },
                { value: '女', label: '女' },
                { value: '其他', label: '其他' }
            ],
            2: [
                { value: '萌新', label: '萌新' },
                { value: '小登', label: '小登' },
                { value: '中登', label: '中登' },
                { value: '老登', label: '老登' }
            ],
            3: [
                { value: '摸鱼新手', label: '摸鱼新手' },
                { value: '打工仔', label: '打工仔' },
                { value: '搬砖人', label: '搬砖人' },
                { value: '职场老油子', label: '职场老油子' },
                { value: '背锅侠', label: '背锅侠' },
                { value: '卷王', label: '卷王' },
                { value: '摆烂选手', label: '摆烂选手' },
                { value: '管理层', label: '管理层' },
                { value: '创业勇士', label: '创业勇士' },
                { value: '自由灵魂', label: '自由灵魂' }
            ],
            4: [
                { value: '差钱', label: '差钱' },
                { value: '不差钱', label: '不差钱' },
                { value: '差钱咋地', label: '差钱咋地' }
            ]
        };

        // 用户选择
        const userData = {
            gender: '',
            age: '',
            occupation: '',
            budget: ''
        };

        // 品牌推荐
        const brands = {
            '喜茶': { drinks: ['多肉葡萄', '烤黑糖波波'], reason: '虽然贵，但让你觉得自己还没那么惨' },
            '奈雪的茶': { drinks: ['霸气橙子', '软欧包'], reason: '买完发朋友圈，人均以为你年入百万' },
            '霸王茶姬': { drinks: ['伯牙绝弦', '青青糯山', '桂馥兰香'], reason: '中产快乐水，属于你的星巴克平替' },
            '古茗': { drinks: ['杨枝甘露', '超A芝士葡萄'], reason: '三四线小城之光，你值得拥有' },
            '书亦烧仙草': { drinks: ['书亦烧仙草', '橙漫山茶花'], reason: '中规中矩，就像你的生活' },
            '茶百道': { drinks: ['杨枝甘露', '芒果糯米饭'], reason: '存在感不强，但也不出错' },
            'CoCo都可': { drinks: ['百香双响炮', '珍珠奶茶'], reason: '经典老字号，属于你的情怀' },
            '一点点': { drinks: ['波霸奶茶', '四季春茶'], reason: '隐藏菜单の王者，仪式感拉满' },
            '蜜雪冰城': { drinks: ['冰鲜柠檬水', '蜜桃四季春'], reason: '4块钱的快乐，还要什么自行车' },
            '茶颜悦色': { drinks: ['幽兰拿铁', '声声乌龙'], reason: '网红打卡必备，属于你的精致穷' },
            '乐乐茶': { drinks: ['酪酪草莓', '脏脏茶'], reason: '网红刺客，一杯更比三杯贵' },
            '沪上阿姨': { drinks: ['血糯米奶茶', '杨枝甘露'], reason: '接地气，属于你的烟火气' }
        };

        // 匹配逻辑
        const matchData = {
            '男': {
                '萌新': { '差钱': ['蜜雪冰城'], '不差钱': ['喜茶', '霸王茶姬'], '差钱咋地': ['蜜雪冰城', '一点点'] },
                '小登': { '差钱': ['一点点', 'CoCo都可'], '不差钱': ['喜茶', '茶百道', '霸王茶姬'], '差钱咋地': ['古茗', '蜜雪冰城'] },
                '中登': { '差钱': ['书亦烧仙草'], '不差钱': ['茶百道', '奈雪', '霸王茶姬'], '差钱咋地': ['一点点', 'CoCo都可'] },
                '老登': { '差钱': ['蜜雪冰城'], '不差钱': ['茶颜悦色', '奈雪', '霸王茶姬'], '差钱咋地': ['古茗', '书亦烧仙草'] }
            },
            '女': {
                '萌新': { '差钱': ['蜜雪冰城'], '不差钱': ['喜茶', '奈雪'], '差钱咋地': ['蜜雪冰城', '沪上阿姨'] },
                '小登': { '差钱': ['蜜雪冰城', '一点点'], '不差钱': ['喜茶', '奈雪', '茶百道'], '差钱咋地': ['沪上阿姨', '书亦烧仙草'] },
                '中登': { '差钱': ['书亦烧仙草'], '不差钱': ['奈雪', '茶百道', '古茗'], '差钱咋地': ['一点点', 'CoCo都可'] },
                '老登': { '差钱': ['蜜雪冰城'], '不差钱': ['茶颜悦色', '奈雪', '霸王茶姬'], '差钱咋地': ['沪上阿姨', '书亦烧仙草'] }
            },
            '其他': {
                '萌新': { '差钱': ['蜜雪冰城'], '不差钱': ['喜茶', '霸王茶姬'], '差钱咋地': ['蜜雪冰城'] },
                '小登': { '差钱': ['一点点'], '不差钱': ['茶百道', '古茗'], '差钱咋地': ['CoCo都可'] },
                '中登': { '差钱': ['书亦烧仙草'], '不差钱': ['霸王茶姬', '奈雪'], '差钱咋地': ['一点点'] },
                '老登': { '差钱': ['蜜雪冰城'], '不差钱': ['茶颜悦色', '奈雪'], '差钱咋地': ['古茗'] }
            }
        };

        // 初始化
        function init() {
            renderOptions(1);
        }

        // 渲染选项
        function renderOptions(step) {
            const container = document.getElementById('options' + step);
            container.innerHTML = options[step].map(opt => `
                <div class="option" data-value="${opt.value}" onclick="selectOption(${step}, this)">
                    ${opt.label}
                </div>
            `).join('');
        }

        // 选择选项
        function selectOption(step, element) {
            // 清除其他选中
            document.querySelectorAll(`#options${step} .option`).forEach(opt => {
                opt.classList.remove('selected');
            });

            // 选中当前
            element.classList.add('selected');

            // 保存数据
            const keys = ['gender', 'age', 'occupation', 'budget'];
            userData[keys[step - 1]] = element.dataset.value;

            //下一步 自动进入
            setTimeout(() => {
                if (step < 4) {
                    goToStep(step + 1);
                } else {
                    showResult();
                }
            }, 200);
        }

        // 进入下一步
        function goToStep(step) {
            // 隐藏当前步骤
            document.getElementById('step' + (step - 1)).style.display = 'none';
            // 显示下一步
            document.getElementById('step' + step).style.display = 'block';
            // 更新进度
            updateProgress(step);
        }

        // 更新进度
        function updateProgress(step) {
            const dots = document.querySelectorAll('.progress-dot');
            dots.forEach((dot, index) => {
                if (index < step) {
                    dot.classList.add('active');
                } else {
                    dot.classList.remove('active');
                }
            });
        }

        // 显示结果
        function showResult() {
            // 隐藏进度和所有步骤
            document.getElementById('progress').style.display = 'none';
            document.querySelectorAll('.step').forEach(s => s.style.display = 'none');

            // 显示加载
            document.getElementById('loading').classList.add('show');

            // 模拟计算
            setTimeout(() => {
                const result = calculateResult();
                renderResult(result);
                document.getElementById('loading').classList.remove('show');
                document.getElementById('result').classList.add('show');
            }, 800);
        }

        // 计算结果
        function calculateResult() {
            const genderData = matchData[userData.gender] || matchData['其他'];
            const ageData = genderData[userData.age] || genderData['小登'];
            const budgetData = ageData[userData.budget] || ageData['不差钱'];

            // 返回2-3个推荐
            return budgetData.slice(0, 3);
        }

        // 渲染结果
        function renderResult(resultBrands) {
            const container = document.getElementById('resultCards');
            container.innerHTML = resultBrands.map((brand, index) => {
                const data = brands[brand] || { drinks: ['经典奶茶'], reason: '适合你的选择' };
                const rank = index === 0 ? '最佳匹配' : `备选${index}`;
                return `
                    <div class="result-card">
                        <div class="result-rank">${rank}</div>
                        <div class="result-brand">${brand}</div>
                        <div class="result-drinks">${data.drinks.join(' / ')}</div>
                        <div class="result-reason">${data.reason}</div>
                    </div>
                `;
            }).join('');
        }

        // 保存图片
        async function saveImage() {
            const result = document.getElementById('result');

            try {
                const canvas = await html2canvas(result, {
                    backgroundColor: '#FAFAFA',
                    scale: 2
                });

                const link = document.createElement('a');
                link.download = '你是什么茶.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
            } catch (e) {
                console.error(e);
                alert('保存失败');
            }
        }

        // 重新开始
        function restart() {
            // 重置数据
            userData.gender = '';
            userData.age = '';
            userData.occupation = '';
            userData.budget = '';

            // 清除选中状态
            document.querySelectorAll('.option').forEach(opt => {
                opt.classList.remove('selected');
            });

            // 隐藏结果，显示进度和第一步
            document.getElementById('result').classList.remove('show');
            document.getElementById('progress').style.display = 'flex';
            document.querySelectorAll('.step').forEach(s => s.style.display = 'none');
            document.getElementById('step1').style.display = 'block';

            // 重置进度
            updateProgress(1);
        }
    </script>
</body>
</html>
