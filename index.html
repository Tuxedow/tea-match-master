<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>你是什么茶</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        :root {
            /* 国风霸王茶姬风格 - 朱砂红主题 */
            --zhusha-red: #C23A3A;
            --zhusha-dark: #8B2525;
            --zhusha-light: #E86868;
            --mi-bai: #FDF8F3;
            --mi-bai-dark: #F5EBE3;
            --tea-green: #7BAO8C;
            --tea-green-light: #A8CDAB;
            --tea-green-pale: #E8F2EA;
            --gold: #D4AF37;
            --gold-light: #F0D78C;
            --gold-glow: rgba(212, 175, 55, 0.4);
            --text-dark: #2C1810;
            --text: #3D2822;
            --text-secondary: #6B5347;
            --shadow: 0 4px 20px rgba(194, 58, 58, 0.15);
            --shadow-hover: 0 8px 30px rgba(194, 58, 58, 0.25);
            --shadow-gold: 0 4px 20px var(--gold-glow);
            --radius: 16px;
            --radius-lg: 24px;
        }

        /* 朱砂红大面积背景 */
        body {
            background: linear-gradient(165deg,
                var(--zhusha-red) 0%,
                var(--zhusha-dark) 40%,
                var(--zhusha-red) 60%,
                var(--zhusha-dark) 100%);
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", "Noto Serif SC", serif;
            position: relative;
            overflow-x: hidden;
        }

        /* 背景装饰 - 东方纹样 */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background:
                radial-gradient(circle at 20% 30%, rgba(212, 175, 55, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(123, 170, 140, 0.1) 0%, transparent 35%),
                radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.03) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        /* 头部 */
        header {
            background: linear-gradient(180deg, rgba(253, 248, 243, 0.95) 0%, rgba(245, 235, 227, 0.9) 100%);
            backdrop-filter: blur(10px);
            border-bottom: 2px solid var(--gold);
            padding: 24px 32px;
            text-align: center;
            position: relative;
            z-index: 10;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.15);
        }

        header::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 4px;
            background: var(--gold);
            border-radius: 2px;
        }

        header h1 {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 8px;
            color: var(--zhusha-dark);
            text-transform: uppercase;
            text-shadow: 1px 1px 2px rgba(212, 175, 55, 0.3);
        }

        /* 主容器 */
        .container {
            position: relative;
            z-index: 1;
            padding: 40px 20px 80px;
        }

        /* 进度条 */
        .progress {
            margin-bottom: 40px;
        }

        .progress-dot {
            background: rgba(255, 255, 255, 0.3);
            height: 6px;
        }

        .progress-dot.active {
            background: linear-gradient(90deg, var(--gold) 0%, var(--gold-light) 100%);
            box-shadow: var(--shadow-gold);
        }

        /* 步骤标题 */
        .step-number {
            color: var(--gold);
            font-weight: 700;
            letter-spacing: 3px;
            font-size: 14px;
        }

        .step-title {
            color: var(--mi-bai);
            font-weight: 600;
            font-size: 28px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
        }

        /* 选项卡片 */
        .options {
            gap: 16px;
        }

        .option {
            background: linear-gradient(135deg, var(--mi-bai) 0%, var(--mi-bai-dark) 100%);
            border: 2px solid transparent;
            border-radius: var(--radius-lg);
            padding: 22px 32px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 18px;
            font-weight: 500;
            color: var(--text);
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .option::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg,
                transparent,
                rgba(212, 175, 55, 0.2),
                transparent);
            transition: left 0.6s ease;
        }

        .option:hover {
            border-color: var(--gold);
            transform: translateY(-5px);
            box-shadow: var(--shadow-hover), var(--shadow-gold);
            background: linear-gradient(135deg, var(--mi-bai) 0%, #FFF5E6 100%);
        }

        .option:hover::before {
            left: 100%;
        }

        .option.selected {
            background: linear-gradient(135deg, var(--zhusha-red) 0%, var(--zhusha-dark) 100%);
            border-color: var(--gold);
            border-width: 3px;
            color: var(--mi-bai);
            font-weight: 700;
            box-shadow: var(--shadow-hover), 0 0 30px var(--gold-glow);
            transform: translateY(-3px) scale(1.02);
        }

        /* 按钮 */
        .btn {
            padding: 18px 36px;
            font-size: 18px;
            font-weight: 600;
            letter-spacing: 2px;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 100%);
            color: var(--zhusha-dark);
            box-shadow: var(--shadow-gold), 0 4px 15px rgba(212, 175, 55, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(212, 175, 55, 0.5);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.15);
            border: 2px solid var(--gold);
            color: var(--mi-bai);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.25);
        }

        /* 结果区域 */
        .result-title {
            color: var(--mi-bai);
            font-size: 24px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        /* 结果卡片 */
        .result-card {
            background: linear-gradient(135deg, var(--mi-bai) 0%, var(--mi-bai-dark) 100%);
            border-radius: var(--radius-lg);
            padding: 28px;
            box-shadow: var(--shadow);
        }

        .result-card:first-child {
            border: 3px solid var(--gold);
            background: linear-gradient(135deg, #FFFDFA 0%, var(--mi-bai) 100%);
            box-shadow: var(--shadow-hover), var(--shadow-gold);
        }

        .result-rank {
            color: var(--zhusha-red);
            font-weight: 700;
            letter-spacing: 2px;
        }

        .result-brand {
            color: var(--zhusha-dark);
            font-size: 26px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--zhusha-red) 0%, var(--gold) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .result-drinks {
            color: var(--text);
            font-size: 16px;
        }

        .result-reason {
            color: var(--text-secondary);
            font-style: italic;
        }

        /* 步骤动画 */
        .step {
            animation: fadeInUp 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 响应式 */
        @media (max-width: 520px) {
            .container {
                padding: 30px 16px 60px;
            }

            .step-title {
                font-size: 24px;
            }

            .option {
                padding: 18px 24px;
                font-size: 16px;
            }

            .result-card {
                padding: 22px;
            }

            .result-brand {
                font-size: 22px;
            }
        }
    </style>
</head>
<body onload="init()">
    <header>
        <h1>你是什么茶</h1>
    </header>

    <div class="container">
        <!-- 进度 -->
        <div class="progress" id="progress">
            <div class="progress-dot active"></div>
            <div class="progress-dot"></div>
            <div class="progress-dot"></div>
            <div class="progress-dot"></div>
        </div>

        <!-- 步骤1: 性别 -->
        <div class="step" id="step1">
            <div class="step-header">
                <div class="step-number">STEP 1 / 4</div>
                <div class="step-title">你是哪种生物？</div>
            </div>
            <div class="options" id="options1"></div>
        </div>

        <!-- 步骤2: 年龄 -->
        <div class="step" id="step2" style="display: none;">
            <div class="step-header">
                <div class="step-number">STEP 2 / 4</div>
                <div class="step-title">你是什么段位？</div>
            </div>
            <div class="options" id="options2"></div>
        </div>

        <!-- 步骤3: 职业 -->
        <div class="step" id="step3" style="display: none;">
            <div class="step-header">
                <div class="step-number">STEP 3 / 4</div>
                <div class="step-title">你靠什么谋生？</div>
            </div>
            <div class="options" id="options3"></div>
        </div>

        <!-- 步骤4: 预算 -->
        <div class="step" id="step4" style="display: none;">
            <div class="step-header">
                <div class="step-number">STEP 4 / 4</div>
                <div class="step-title">你有多少预算？</div>
            </div>
            <div class="options" id="options4"></div>
        </div>

        <!-- 加载中 -->
        <div class="loading" id="loading">
            <div class="loading-dots">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>

        <!-- 结果 -->
        <div class="result" id="result">
            <div class="result-title">测出来了，你自己看吧</div>
            <div id="resultCards"></div>
            <div class="actions">
                <button class="btn btn-secondary" onclick="saveImage()">保存图片</button>
                <button class="btn btn-primary" onclick="restart()">再测一次</button>
            </div>
        </div>
    </div>

    <script>
        // 选项配置
        const options = {
            1: [
                { value: '男', label: '男' },
                { value: '女', label: '女' },
                { value: '其他', label: '其他' }
            ],
            2: [
                { value: '萌新', label: '萌新' },
                { value: '小登', label: '小登' },
                { value: '中登', label: '中登' },
                { value: '老登', label: '老登' }
            ],
            3: [
                { value: '摸鱼新手', label: '摸鱼新手' },
                { value: '打工仔', label: '打工仔' },
                { value: '搬砖人', label: '搬砖人' },
                { value: '职场老油子', label: '职场老油子' },
                { value: '背锅侠', label: '背锅侠' },
                { value: '卷王', label: '卷王' },
                { value: '摆烂选手', label: '摆烂选手' },
                { value: '管理层', label: '管理层' },
                { value: '创业勇士', label: '创业勇士' },
                { value: '自由灵魂', label: '自由灵魂' }
            ],
            4: [
                { value: '差钱', label: '差钱' },
                { value: '不差钱', label: '不差钱' },
                { value: '差钱咋地', label: '差钱咋地' }
            ]
        };

        // 用户选择
        const userData = {
            gender: '',
            age: '',
            occupation: '',
            budget: ''
        };

        // 品牌推荐
        const brands = {
            '喜茶': { drinks: ['多肉葡萄', '烤黑糖波波'], reason: '虽然贵，但让你觉得自己还没那么惨' },
            '奈雪的茶': { drinks: ['霸气橙子', '软欧包'], reason: '买完发朋友圈，人均以为你年入百万' },
            '霸王茶姬': { drinks: ['伯牙绝弦', '青青糯山', '桂馥兰香'], reason: '中产快乐水，属于你的星巴克平替' },
            '古茗': { drinks: ['杨枝甘露', '超A芝士葡萄'], reason: '三四线小城之光，你值得拥有' },
            '书亦烧仙草': { drinks: ['书亦烧仙草', '橙漫山茶花'], reason: '中规中矩，就像你的生活' },
            '茶百道': { drinks: ['杨枝甘露', '芒果糯米饭'], reason: '存在感不强，但也不出错' },
            'CoCo都可': { drinks: ['百香双响炮', '珍珠奶茶'], reason: '经典老字号，属于你的情怀' },
            '一点点': { drinks: ['波霸奶茶', '四季春茶'], reason: '隐藏菜单の王者，仪式感拉满' },
            '蜜雪冰城': { drinks: ['冰鲜柠檬水', '蜜桃四季春'], reason: '4块钱的快乐，还要什么自行车' },
            '茶颜悦色': { drinks: ['幽兰拿铁', '声声乌龙'], reason: '网红打卡必备，属于你的精致穷' },
            '乐乐茶': { drinks: ['酪酪草莓', '脏脏茶'], reason: '网红刺客，一杯更比三杯贵' },
            '沪上阿姨': { drinks: ['血糯米奶茶', '杨枝甘露'], reason: '接地气，属于你的烟火气' }
        };

        // 匹配逻辑
        const matchData = {
            '男': {
                '萌新': { '差钱': ['蜜雪冰城'], '不差钱': ['喜茶', '霸王茶姬'], '差钱咋地': ['蜜雪冰城', '一点点'] },
                '小登': { '差钱': ['一点点', 'CoCo都可'], '不差钱': ['喜茶', '茶百道', '霸王茶姬'], '差钱咋地': ['古茗', '蜜雪冰城'] },
                '中登': { '差钱': ['书亦烧仙草'], '不差钱': ['茶百道', '奈雪', '霸王茶姬'], '差钱咋地': ['一点点', 'CoCo都可'] },
                '老登': { '差钱': ['蜜雪冰城'], '不差钱': ['茶颜悦色', '奈雪', '霸王茶姬'], '差钱咋地': ['古茗', '书亦烧仙草'] }
            },
            '女': {
                '萌新': { '差钱': ['蜜雪冰城'], '不差钱': ['喜茶', '奈雪'], '差钱咋地': ['蜜雪冰城', '沪上阿姨'] },
                '小登': { '差钱': ['蜜雪冰城', '一点点'], '不差钱': ['喜茶', '奈雪', '茶百道'], '差钱咋地': ['沪上阿姨', '书亦烧仙草'] },
                '中登': { '差钱': ['书亦烧仙草'], '不差钱': ['奈雪', '茶百道', '古茗'], '差钱咋地': ['一点点', 'CoCo都可'] },
                '老登': { '差钱': ['蜜雪冰城'], '不差钱': ['茶颜悦色', '奈雪', '霸王茶姬'], '差钱咋地': ['沪上阿姨', '书亦烧仙草'] }
            },
            '其他': {
                '萌新': { '差钱': ['蜜雪冰城'], '不差钱': ['喜茶', '霸王茶姬'], '差钱咋地': ['蜜雪冰城'] },
                '小登': { '差钱': ['一点点'], '不差钱': ['茶百道', '古茗'], '差钱咋地': ['CoCo都可'] },
                '中登': { '差钱': ['书亦烧仙草'], '不差钱': ['霸王茶姬', '奈雪'], '差钱咋地': ['一点点'] },
                '老登': { '差钱': ['蜜雪冰城'], '不差钱': ['茶颜悦色', '奈雪'], '差钱咋地': ['古茗'] }
            }
        };

        // 初始化
        function init() {
            renderOptions(1);
        }

        // 渲染选项
        function renderOptions(step) {
            const container = document.getElementById('options' + step);
            container.innerHTML = options[step].map(opt => `
                <div class="option" data-value="${opt.value}" onclick="selectOption(${step}, this)">
                    ${opt.label}
                </div>
            `).join('');
        }

        // 选择选项
        function selectOption(step, element) {
            // 清除其他选中
            document.querySelectorAll(`#options${step} .option`).forEach(opt => {
                opt.classList.remove('selected');
            });

            // 选中当前
            element.classList.add('selected');

            // 保存数据
            const keys = ['gender', 'age', 'occupation', 'budget'];
            userData[keys[step - 1]] = element.dataset.value;

            //下一步 自动进入
            setTimeout(() => {
                if (step < 4) {
                    goToStep(step + 1);
                } else {
                    showResult();
                }
            }, 200);
        }

        // 进入下一步
        function goToStep(step) {
            // 隐藏当前步骤
            document.getElementById('step' + (step - 1)).style.display = 'none';
            // 显示下一步
            document.getElementById('step' + step).style.display = 'block';
            // 渲染选项
            renderOptions(step);
            // 更新进度
            updateProgress(step);
        }

        // 更新进度
        function updateProgress(step) {
            const dots = document.querySelectorAll('.progress-dot');
            dots.forEach((dot, index) => {
                if (index < step) {
                    dot.classList.add('active');
                } else {
                    dot.classList.remove('active');
                }
            });
        }

        // 显示结果
        function showResult() {
            // 隐藏进度和所有步骤
            document.getElementById('progress').style.display = 'none';
            document.querySelectorAll('.step').forEach(s => s.style.display = 'none');

            // 显示加载
            document.getElementById('loading').classList.add('show');

            // 模拟计算
            setTimeout(() => {
                const result = calculateResult();
                renderResult(result);
                document.getElementById('loading').classList.remove('show');
                document.getElementById('result').classList.add('show');
            }, 800);
        }

        // 计算结果
        function calculateResult() {
            const genderData = matchData[userData.gender] || matchData['其他'];
            const ageData = genderData[userData.age] || genderData['小登'];
            const budgetData = ageData[userData.budget] || ageData['不差钱'];

            // 返回2-3个推荐
            return budgetData.slice(0, 3);
        }

        // 渲染结果
        function renderResult(resultBrands) {
            const container = document.getElementById('resultCards');
            container.innerHTML = resultBrands.map((brand, index) => {
                const data = brands[brand] || { drinks: ['经典奶茶'], reason: '适合你的选择' };
                const rank = index === 0 ? '最佳匹配' : `备选${index}`;
                return `
                    <div class="result-card">
                        <div class="result-rank">${rank}</div>
                        <div class="result-brand">${brand}</div>
                        <div class="result-drinks">${data.drinks.join(' / ')}</div>
                        <div class="result-reason">${data.reason}</div>
                    </div>
                `;
            }).join('');
        }

        // 保存图片
        async function saveImage() {
            const result = document.getElementById('result');

            try {
                const canvas = await html2canvas(result, {
                    backgroundColor: '#FAFAFA',
                    scale: 2
                });

                const link = document.createElement('a');
                link.download = '你是什么茶.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
            } catch (e) {
                console.error(e);
                alert('保存失败');
            }
        }

        // 重新开始
        function restart() {
            // 重置数据
            userData.gender = '';
            userData.age = '';
            userData.occupation = '';
            userData.budget = '';

            // 清除选中状态
            document.querySelectorAll('.option').forEach(opt => {
                opt.classList.remove('selected');
            });

            // 隐藏结果，显示进度和第一步
            document.getElementById('result').classList.remove('show');
            document.getElementById('progress').style.display = 'flex';
            document.querySelectorAll('.step').forEach(s => s.style.display = 'none');
            document.getElementById('step1').style.display = 'block';

            // 重置进度
            updateProgress(1);
        }
    </script>
</body>
</html>
