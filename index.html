<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>你是什么茶</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        :root {
            /* Instagram风格配色 */
            --insta-red: #FF3B30;
            --insta-yellow: #FFCC00;
            --insta-blue: #007AFF;
            --insta-pink: #FF2D55;
            --insta-orange: #FF9500;
            --insta-green: #34C759;
            --dark-bg: #0A0A0A;
            --dark-card: #1A1A1A;
            --dark-card-hover: #252525;
            --white: #FFFFFF;
            --text-gray: #8E8E93;
            --text-light: #C7C7CC;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            --shadow-hover: 0 8px 30px rgba(0, 0, 0, 0.5);
            --radius: 16px;
            --radius-lg: 24px;
        }

        /* Instagram渐变背景 */
        body {
            background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
            background-size: 400% 400%;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", sans-serif;
            position: relative;
        }

        /* 头部 */
        header {
            background: linear-gradient(90deg, #f09433 0%, #dc2743 50%, #bc1888 100%);
            padding: 16px 20px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        header h1 {
            font-size: 22px;
            font-weight: 800;
            letter-spacing: 1px;
            color: #ffffff;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.2);
        }

        /* 主容器 */
        .container {
            position: relative;
            z-index: 1;
            max-width: 480px;
            margin: 0 auto;
            padding: 30px 16px 100px;
        }

        /* 卡片容器 */
        .card {
            background: var(--white);
            border-radius: var(--radius-lg);
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: var(--shadow);
        }

        /* 进度条 */
        .progress {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 30px;
        }

        .progress-dot {
            width: 40px;
            height: 6px;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 3px;
            transition: all 0.3s ease;
        }

        .progress-dot.active {
            background: linear-gradient(90deg, #f09433, #dc2743, #bc1888);
            width: 50px;
            box-shadow: 0 2px 10px rgba(220, 39, 67, 0.6);
        }

        /* 步骤标题 */
        .step-number {
            color: var(--insta-red);
            font-weight: 800;
            letter-spacing: 3px;
            font-size: 14px;
            margin-bottom: 8px;
        }

        .step-title {
            color: var(--dark-bg);
            font-weight: 800;
            font-size: 26px;
            margin-bottom: 24px;
        }

        /* 选项卡片 */
        .options {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .option {
            background: var(--white);
            border: 2px solid #E5E5EA;
            border-radius: var(--radius);
            padding: 18px 24px;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 17px;
            font-weight: 600;
            color: var(--dark-bg);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .option:hover {
            border-color: var(--insta-blue);
            transform: scale(1.02);
            box-shadow: 0 6px 20px rgba(0, 122, 255, 0.3);
            background: #F2F2F7;
        }

        .option.selected {
            background: linear-gradient(135deg, var(--insta-red) 0%, var(--insta-pink) 100%);
            border-color: var(--insta-red);
            color: var(--white);
            font-weight: 800;
            transform: scale(1.03);
            box-shadow: 0 8px 25px rgba(255, 59, 48, 0.4);
        }

        /* 按钮 */
        .actions {
            display: flex;
            gap: 14px;
            margin-top: 30px;
        }

        .btn {
            flex: 1;
            padding: 18px 28px;
            border: none;
            border-radius: var(--radius);
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.25s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-primary {
            background: #2196F3;
            color: #FFFFFF;
            border: none;
        }

        .btn-primary:hover {
            background: #1976D2;
        }

        .btn-secondary {
            background: #F5F5F5;
            color: #333333;
            border: 1px solid #DDDDDD;
        }

        .btn-secondary:hover {
            background: #EEEEEE;
        }

        /* 结果区域 */
        .result {
            display: none;
        }

        .result.show {
            display: block;
        }

        .result-title {
            color: #333333;
            font-size: 24px;
            font-weight: 800;
            text-align: center;
            margin-bottom: 20px;
        }

        /* 结果卡片容器 */
        .result-wrapper {
            background: #FFFFFF;
            border-radius: 16px;
            padding: 20px;
            border: 1px solid #DDDDDD;
        }

        /* 结果卡片 - 最佳匹配 */
        .result-card {
            background: #FFFFFF;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
        }

        .result-card:last-child {
            margin-bottom: 0;
        }

        .result-card.best {
            background: #FFF8E1;
            border: 2px solid #FF9800;
        }

        .result-card.alt {
            background: #FFFFFF;
            border: 1px solid #E0E0E0;
        }

        .result-rank {
            color: #FF5722;
            font-weight: 900;
            font-size: 12px;
            margin-bottom: 6px;
        }

        .result-brand {
            font-size: 24px;
            font-weight: 900;
            color: #333333;
            margin-bottom: 6px;
        }

        .result-drinks {
            font-size: 14px;
            color: #555555;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .result-reason {
            font-size: 13px;
            color: #666666;
            line-height: 1.5;
        }

        /* 步骤动画 */
        .step {
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 加载动画 */
        .loading {
            display: none;
            text-align: center;
            padding: 60px;
        }

        .loading.show {
            display: block;
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top-color: #ffffff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* 响应式 */
        @media (max-width: 480px) {
            .container {
                padding: 20px 12px 80px;
            }

            .card {
                padding: 20px;
                border-radius: var(--radius);
            }

            .step-title {
                font-size: 22px;
            }

            .option {
                padding: 16px 20px;
                font-size: 16px;
            }

            .result-brand {
                font-size: 24px;
            }

            .btn {
                padding: 16px 20px;
                font-size: 15px;
            }
        }
    </style>
</head>
<body onload="init()">
    <header>
        <h1>你是什么茶</h1>
    </header>

    <div class="container">
        <!-- 进度 -->
        <div class="progress" id="progress">
            <div class="progress-dot active"></div>
            <div class="progress-dot"></div>
            <div class="progress-dot"></div>
            <div class="progress-dot"></div>
        </div>

        <!-- 步骤1: 性别 -->
        <div class="step card" id="step1">
            <div class="step-number">STEP 1 / 4</div>
            <div class="step-title">你是哪种生物？</div>
            <div class="options" id="options1"></div>
        </div>

        <!-- 步骤2: 年龄 -->
        <div class="step card" id="step2" style="display: none;">
            <div class="step-number">STEP 2 / 4</div>
            <div class="step-title">你是什么段位？</div>
            <div class="options" id="options2"></div>
        </div>

        <!-- 步骤3: 职业 -->
        <div class="step card" id="step3" style="display: none;">
            <div class="step-number">STEP 3 / 4</div>
            <div class="step-title">你靠什么谋生？</div>
            <div class="options" id="options3"></div>
        </div>

        <!-- 步骤4: 预算 -->
        <div class="step card" id="step4" style="display: none;">
            <div class="step-number">STEP 4 / 4</div>
            <div class="step-title">你的价格范围？</div>
            <div class="options" id="options4"></div>
        </div>

        <!-- 加载中 -->
        <div class="loading" id="loading">
            <div class="loading-spinner"></div>
        </div>

        <!-- 结果 -->
        <div class="result" id="result">
            <div class="result-title">测出来了，你自己看吧</div>
            <div class="result-wrapper">
                <div id="resultCards"></div>
            </div>
            <div class="actions">
                <button class="btn btn-secondary" onclick="saveImage()">保存图片</button>
                <button class="btn btn-primary" onclick="restart()">再测一次</button>
            </div>
        </div>
    </div>

    <script>
        // 选项配置
        const options = {
            1: [
                { value: '男', label: '男' },
                { value: '女', label: '女' }
            ],
            2: [
                { value: '小登', label: '小登' },
                { value: '中登', label: '中登' },
                { value: '老登', label: '老登' }
            ],
            3: [
                { value: '摸鱼新手', label: '摸鱼新手' },
                { value: '搬砖人', label: '搬砖人' },
                { value: '职场老油子', label: '职场老油子' },
                { value: '背锅侠', label: '背锅侠' },
                { value: '卷王', label: '卷王' },
                { value: '摆烂选手', label: '摆烂选手' },
                { value: '自由灵魂', label: '自由灵魂' }
            ],
            4: [
                { value: '差钱', label: '差钱' },
                { value: '不差钱', label: '不差钱' },
                { value: '差钱咋地', label: '差钱咋地' }
            ]
        };

        // 用户选择
        const userData = {
            gender: '',
            age: '',
            occupation: '',
            budget: ''
        };

        // 品牌推荐
        const brands = {
            '喜茶': { drinks: ['多肉葡萄', '烤黑糖波波'], reason: '虽然贵，但让你觉得自己还没那么惨' },
            '奈雪的茶': { drinks: ['霸气橙子', '软欧包'], reason: '买完发朋友圈，人均以为你年入百万' },
            '霸王茶姬': { drinks: ['伯牙绝弦', '青青糯山', '桂馥兰香'], reason: '中产快乐水，属于你的星巴克平替' },
            '古茗': { drinks: ['杨枝甘露', '超A芝士葡萄'], reason: '三四线小城之光，你值得拥有' },
            '书亦烧仙草': { drinks: ['书亦烧仙草', '橙漫山茶花'], reason: '中规中矩，就像你的生活' },
            '茶百道': { drinks: ['杨枝甘露', '芒果糯米饭'], reason: '存在感不强，但也不出错' },
            'CoCo都可': { drinks: ['百香双响炮', '珍珠奶茶'], reason: '经典老字号，属于你的情怀' },
            '一点点': { drinks: ['波霸奶茶', '四季春茶'], reason: '隐藏菜单の王者，仪式感拉满' },
            '蜜雪冰城': { drinks: ['冰鲜柠檬水', '蜜桃四季春'], reason: '4块钱的快乐，还要什么自行车' },
            '茶颜悦色': { drinks: ['幽兰拿铁', '声声乌龙'], reason: '网红打卡必备，属于你的精致穷' },
            '乐乐茶': { drinks: ['酪酪草莓', '脏脏茶'], reason: '网红刺客，一杯更比三杯贵' },
            '沪上阿姨': { drinks: ['血糯米奶茶', '杨枝甘露'], reason: '接地气，属于你的烟火气' }
        };

        // 匹配逻辑
        const matchData = {
            '男': {
                '小登': { '差钱': ['一点点', 'CoCo都可'], '不差钱': ['喜茶', '茶百道', '霸王茶姬'], '差钱咋地': ['古茗', '蜜雪冰城'] },
                '中登': { '差钱': ['书亦烧仙草'], '不差钱': ['茶百道', '奈雪', '霸王茶姬'], '差钱咋地': ['一点点', 'CoCo都可'] },
                '老登': { '差钱': ['蜜雪冰城'], '不差钱': ['茶颜悦色', '奈雪', '霸王茶姬'], '差钱咋地': ['古茗', '书亦烧仙草'] }
            },
            '女': {
                '小登': { '差钱': ['蜜雪冰城', '一点点'], '不差钱': ['喜茶', '奈雪', '茶百道'], '差钱咋地': ['沪上阿姨', '书亦烧仙草'] },
                '中登': { '差钱': ['书亦烧仙草'], '不差钱': ['奈雪', '茶百道', '古茗'], '差钱咋地': ['一点点', 'CoCo都可'] },
                '老登': { '差钱': ['蜜雪冰城'], '不差钱': ['茶颜悦色', '奈雪', '霸王茶姬'], '差钱咋地': ['沪上阿姨', '书亦烧仙草'] }
            }
        };

        // 初始化
        function init() {
            renderOptions(1);
        }

        // 渲染选项
        function renderOptions(step) {
            const container = document.getElementById('options' + step);
            container.innerHTML = options[step].map(opt => `
                <div class="option" data-value="${opt.value}" onclick="selectOption(${step}, this)">
                    ${opt.label}
                </div>
            `).join('');
        }

        // 选择选项
        function selectOption(step, element) {
            document.querySelectorAll(`#options${step} .option`).forEach(opt => {
                opt.classList.remove('selected');
            });
            element.classList.add('selected');

            const keys = ['gender', 'age', 'occupation', 'budget'];
            userData[keys[step - 1]] = element.dataset.value;

            setTimeout(() => {
                if (step < 4) {
                    goToStep(step + 1);
                } else {
                    showResult();
                }
            }, 250);
        }

        // 进入下一步
        function goToStep(step) {
            document.getElementById('step' + (step - 1)).style.display = 'none';
            document.getElementById('step' + step).style.display = 'block';
            renderOptions(step);
            updateProgress(step);
        }

        // 更新进度
        function updateProgress(step) {
            const dots = document.querySelectorAll('.progress-dot');
            dots.forEach((dot, index) => {
                if (index < step) {
                    dot.classList.add('active');
                } else {
                    dot.classList.remove('active');
                }
            });
        }

        // 显示结果
        function showResult() {
            document.getElementById('progress').style.display = 'none';
            document.querySelectorAll('.step').forEach(s => s.style.display = 'none');
            document.getElementById('loading').classList.add('show');

            setTimeout(() => {
                const result = calculateResult();
                renderResult(result);
                document.getElementById('loading').classList.remove('show');
                document.getElementById('result').classList.add('show');
            }, 1000);
        }

        // 计算结果
        function calculateResult() {
            const genderData = matchData[userData.gender];
            const ageData = genderData[userData.age];
            const budgetData = ageData[userData.budget];
            return budgetData.slice(0, 3);
        }

        // 渲染结果
        function renderResult(resultBrands) {
            const container = document.getElementById('resultCards');
            container.innerHTML = resultBrands.map((brand, index) => {
                const data = brands[brand] || { drinks: ['经典奶茶'], reason: '适合你的选择' };
                const rank = index === 0 ? '🏆 最佳匹配' : `🥈 备选${index}`;
                const cardClass = index === 0 ? 'result-card best' : 'result-card alt';
                return `
                    <div class="${cardClass}">
                        <div class="result-rank">${rank}</div>
                        <div class="result-brand">${brand}</div>
                        <div class="result-drinks">${data.drinks.join(' / ')}</div>
                        <div class="result-reason">${data.reason}</div>
                    </div>
                `;
            }).join('');
        }

        // 保存图片
        async function saveImage() {
            const result = document.getElementById('result');
            try {
                const canvas = await html2canvas(result, {
                    backgroundColor: '#ffffff',
                    scale: 3,
                    useCORS: true
                });
                const link = document.createElement('a');
                link.download = '你是什么茶.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
            } catch (e) {
                console.error(e);
                alert('保存失败');
            }
        }

        // 重新开始
        function restart() {
            userData.gender = '';
            userData.age = '';
            userData.occupation = '';
            userData.budget = '';
            document.querySelectorAll('.option').forEach(opt => opt.classList.remove('selected'));
            document.getElementById('result').classList.remove('show');
            document.getElementById('progress').style.display = 'flex';
            document.querySelectorAll('.step').forEach(s => s.style.display = 'none');
            document.getElementById('step1').style.display = 'block';
            updateProgress(1);
        }
    </script>
</body>
</html>
